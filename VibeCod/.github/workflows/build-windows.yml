name: Build Windows App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: VibeCod/package-lock.json

      - name: Install dependencies
        working-directory: ./VibeCod
        run: npm ci

      - name: Build application
        working-directory: ./VibeCod
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeCod-Setup
          path: VibeCod/dist/VibeCod Setup*.exe
          if-no-files-found: ignore

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeCod-Portable
          path: VibeCod/dist/VibeCod*.exe
          if-no-files-found: ignore

      - name: Upload unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeCod-Unpacked
          path: VibeCod/dist/win-unpacked/
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            VibeCod-Setup/*.exe
            VibeCod-Portable/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
