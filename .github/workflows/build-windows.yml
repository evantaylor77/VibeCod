name: Build Windows App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./VibeCod
        run: npm install

      - name: Build application
        working-directory: ./VibeCod
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist contents
        working-directory: ./VibeCod
        run: Get-ChildItem -Path dist -Recurse

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VibeCod-Setup
          path: "VibeCod/dist/VibeCod Setup *.exe"
          if-no-files-found: ignore

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: VibeCod-Portable
          path: VibeCod/dist/*.exe
          if-no-files-found: ignore

      - name: Zip unpacked folder
        working-directory: ./VibeCod/dist
        run: powershell Compress-Archive -Path win-unpacked\* -DestinationPath ..\..\VibeCod-Windows-Portable.zip

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: VibeCod-Windows-Portable-Zip
          path: VibeCod-Windows-Portable.zip
          if-no-files-found: ignore
